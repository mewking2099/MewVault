model_list:
  # DeepSeek — pure-generation tasks dispatched by Claude via `mew dispatch`
  # Claude itself runs via Claude Code subscription (no proxy needed)
  - model_name: mew-coder-simple
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: mew-coder-reason
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false

router_settings:
  num_retries: 2
  timeout: 60

general_settings:
  master_key: os.environ/MEW_PROXY_KEY
  port: 4000
